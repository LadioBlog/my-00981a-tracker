<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>00981A 自動追蹤面板</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-xl shadow-md max-w-md w-full">
        <h1 class="text-2xl font-bold text-center text-blue-600 mb-6">00981A 統一台灣高息優選證券投資信託基金</h1>
        
        <div class="space-y-4 text-lg">
            <div class="flex justify-between border-b pb-2">
                <span class="text-gray-500">最新市價：</span>
                <span id="price" class="font-bold text-gray-800">載入中...</span>
            </div>
            <div class="flex justify-between border-b pb-2">
                <span class="text-gray-500">更新時間：</span>
                <span id="update_time" class="text-gray-600">載入中...</span>
            </div>
        </div>
        <p class="text-xs text-gray-400 text-center mt-6">資料每日盤後透過 GitHub Actions 自動更新</p>
    </div>

    <script>
        // 讓網頁去讀取同目錄下的 data.json 檔案
        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                document.getElementById('price').innerText = `NT$ ${data.price}`;
                document.getElementById('update_time').innerText = data.time;
            })
            .catch(err => {
                document.getElementById('price').innerText = "尚未有資料";
                document.getElementById('update_time').innerText = "請等待第一次爬蟲執行";
            });
    </script>
</body>
</html>
